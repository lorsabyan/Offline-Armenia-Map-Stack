worker_processes  auto;

user  nginx;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    keepalive_requests 100;
    types_hash_max_size 4096;

    # Docker embedded DNS for dynamic upstream resolution
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=tiles:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=manager:10m rate=5r/s;

    # Tile proxy cache — serves stale tiles when backend is down
    proxy_cache_path /var/cache/nginx/tiles levels=1:2 keys_zone=tile_cache:10m
                     max_size=2g inactive=7d use_temp_path=off;

    # Blue-green Photon upstream — nginx retries the other instance
    # if one returns an error, so zero requests fail during rolling updates.
    #
    # NOTE (nginx OSS limitation): upstream blocks resolve DNS at startup and
    # cache the result.  Docker keeps the same container IP across restarts,
    # so this works normally.  If you force-recreate a Photon container
    # (docker compose up -d --force-recreate photon-blue), reload nginx
    # afterwards:  docker compose exec nginx nginx -s reload
    upstream photon_cluster {
        server photon-blue:2322   max_fails=2 fail_timeout=5s;
        server photon-green:2322  max_fails=2 fail_timeout=5s;
    }

    server {
        listen 80;
        server_name _;

        # NOTE: Security headers defined at server level are NOT inherited by
        # location blocks that use add_header.  Every location block that adds
        # any header must repeat the full set.  See individual locations below.

        # Limit request body size (protects against large POST payloads)
        client_max_body_size 8k;

        # JSON error response for unavailable backends
        error_page 502 503 504 /api_error.json;
        location = /api_error.json {
            internal;
            default_type application/json;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "geolocation=(self)" always;
            add_header Retry-After 30 always;
            return 503 '{"error":"service temporarily unavailable","retry_after":30}';
        }

        # Health check endpoint
        location = /health {
            default_type text/plain;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "geolocation=(self)" always;
            return 200 'offline-armenia-map stack is up';
        }

        # Prometheus metrics endpoint — restricted to localhost and Docker networks
        location = /metrics {
            allow 127.0.0.0/8;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            set $manager_backend manager:8000;
            proxy_pass http://$manager_backend/metrics;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;

            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "geolocation=(self)" always;
        }

        # Manager API for on-demand updates — restricted to private networks
        location /manager/ {
            allow 127.0.0.0/8;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            limit_req zone=manager burst=10 nodelay;

            set $manager_backend manager:8000;
            proxy_pass http://$manager_backend;
            rewrite ^/manager/(.*) /$1 break;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 300s;

            # SSE support: disable buffering
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;

            # Security headers (must repeat — nginx drops inherited headers
            # when any add_header is present in a location block)
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "geolocation=(self)" always;
        }

        # Test app — served at root and /app
        location / {
            root /usr/share/nginx/html/test-app;
            index index.html;
            try_files $uri $uri/ /index.html;

            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "geolocation=(self)" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self';" always;
        }

        location /app {
            alias /usr/share/nginx/html/test-app;
            index index.html;
            try_files $uri $uri/ /app/index.html;

            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "geolocation=(self)" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self';" always;
        }

        # Photon geocoding API — blue-green failover
        location /photon/ {
            limit_req zone=api burst=50 nodelay;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "*";
                add_header Access-Control-Allow-Methods "GET, OPTIONS";
                add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept";
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                return 204;
            }

            proxy_pass http://photon_cluster;
            rewrite ^/photon/(.*) /$1 break;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_connect_timeout 2s;
            proxy_read_timeout 30s;

            # On error/timeout, retry on the other instance — zero lost requests
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 5s;

            # Security headers
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "geolocation=(self)" always;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        }

        # Direct health-check endpoints for individual Photon instances
        # Restricted to private networks (internal diagnostics only)
        location /photon-blue/ {
            allow 127.0.0.0/8;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            set $photon_blue photon-blue:2322;
            proxy_pass http://$photon_blue;
            rewrite ^/photon-blue/(.*) /$1 break;
            proxy_connect_timeout 2s;
            proxy_read_timeout 5s;
        }
        location /photon-green/ {
            allow 127.0.0.0/8;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            set $photon_green photon-green:2322;
            proxy_pass http://$photon_green;
            rewrite ^/photon-green/(.*) /$1 break;
            proxy_connect_timeout 2s;
            proxy_read_timeout 5s;
        }

        # OSRM routing API
        location /osrm/ {
            limit_req zone=api burst=50 nodelay;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "*";
                add_header Access-Control-Allow-Methods "GET, OPTIONS";
                add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept";
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                return 204;
            }

            set $osrm_backend osrm:5000;
            proxy_pass http://$osrm_backend;
            rewrite ^/osrm/(.*) /$1 break;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 120s;

            # Security headers
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "geolocation=(self)" always;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        }

        # Tile server proxy with caching
        location /tiles/ {
            limit_req zone=tiles burst=100 nodelay;

            set $tile_backend tile-server:80;
            proxy_pass http://$tile_backend;
            rewrite ^/tiles/(.*) /tile/$1 break;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 120s;

            # Tile caching at NGINX level
            proxy_cache tile_cache;
            proxy_cache_valid 200 5m;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_lock on;
            proxy_cache_lock_timeout 30s;

            # Security headers
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "geolocation=(self)" always;
            add_header X-Cache-Status $upstream_cache_status always;
            add_header Cache-Control "public, max-age=300" always;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        }
    }
}
